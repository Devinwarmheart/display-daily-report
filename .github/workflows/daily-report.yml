name: Display Industry Daily Report

on:
  schedule:
    # 北京时间每天 7 点 (UTC 时间 23 点，前一天)
    - cron: '0 23 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Fetch News
        run: |
          echo "Fetching news from global sources..."
          python src/fetch_news.py
      
      - name: Generate Report
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          echo "Generating AI report..."
          python src/generate_report.py
      
      - name: Build Site
        run: |
          echo "Building website..."
          mkdir -p docs/daily
          mkdir -p docs/assets
          
          # 复制今日日报
          if [ -f report.html ]; then
            cp report.html docs/daily/$(date +%Y-%m-%d).html
            echo "Report copied for $(date +%Y-%m-%d)"
          else
            echo "Report not found!"
            exit 1
          fi
          
          # 生成首页
          python src/build_site.py
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          commit_message: "Daily report: $(date +%Y-%m-%d) [skip ci]"
          keep_files: true
      
      - name: Notify Success
        if: success()
        run: |
          echo "✅ Daily report generated and deployed successfully!"
          echo "📺 View at: https://${{ github.repository_owner }}.github.io/display-daily-report/"
      
      - name: Notify Failure
        if: failure()
        run: |
          echo "❌ Failed to generate daily report"
          exit 1
